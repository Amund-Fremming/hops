[server]
address = "0.0.0.0"
port = 8080

[database]
url = "postgres://postgres:password@postgres:5432/storage"

[auth]
audience = "hops"
issuer = "hops"

[otp]
ttl_minutes = 5
max_attempts = 3
max_messages_per_day = 10
cleanup_interval_minutes = 60

[crypto]
secret = ""  # Set via APP__CRYPTO__SECRET env var

[comms]
username = ""  # Set via APP__COMMS__USERNAME env var
password = ""  # Set via APP__COMMS__PASSWORD env var
from = ""  # Set via APP__COMMS__FROM env var
otp_message_template = "Your verification code is {code}"
