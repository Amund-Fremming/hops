[server]
address = "127.0.0.1"
port = 3000

[database]
url = "postgres://postgres:password@localhost:5432/storage"

[auth]
audience = "hops-dev"
issuer = "hops-dev"
access_token_lifetime_minutes = 15
refresh_token_lifetime_days = 30
max_failed_login_attempts = 5

[otp]
ttl_minutes = 5
max_attempts = 3
max_messages_per_day = 10
cleanup_interval_minutes = 60

[crypto]
secret = "dev-secret-change-in-production"

[comms]
username = ""  # Set via APP__COMMS__USERNAME env var
password = ""  # Set via APP__COMMS__PASSWORD env var
from = "Hops"
otp_message_template = "Your verification code is {code}"

[audit]
retention_days = 90
cleanup_interval_hours = 24

[admin]
admins = []
